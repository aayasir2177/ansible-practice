---

- hosts: all
  become: true
  pre_tasks:

  - name: install updates (Fedora)
    dnf:
      update_only: yes
      update_cache: yes
    when: ansible_facts['distribution'] == 'Fedora'

  - name: install updates (Ubuntu) 
    apt:
      upgrade: dist
      update_cache: yes
    when: ansible_facts['distribution'] == 'Ubuntu'
  
  tasks:

  - name: add simone user
    user:
      name: simone
      groups: root 

  - name: add ssh key for simone
    authorized_key: 
      user: simone
      key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFnVGsnKxpdk0hW5rtvFD/8qtcHbEJroFLfN5DUpnKmp yasir@fedora"

  - name: add sudoers file for simone
    copy: 
      src: sudoer_simone
      dest: /etc/sudoers.d/simone
      owner: root
      group: root
      mode: 0440 
